name: Auto-Update README with Versions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'clusters/main/talos/talconfig.yaml'
      - 'clusters/main/kubernetes/**/helm-release.yaml'
      - 'repositories/helm/*.yaml'
      - '.github/workflows/update-readme.yaml'
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    name: Update README with Current Versions
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Extract and Update Versions
        id: versions
        run: |
          python3 - <<'EOF'
          import yaml
          import json
          import os
          import re
          from datetime import datetime
          
          versions = {}
          
          # 1. Lire talconfig.yaml pour Talos et K8s versions
          try:
              with open('clusters/main/talos/talconfig.yaml', 'r') as f:
                  talos_config = yaml.safe_load(f)
                  versions['talos'] = talos_config.get('talosVersion', 'unknown').replace('v', '')
                  versions['kubernetes'] = talos_config.get('kubernetesVersion', 'unknown').replace('v', '')
          except Exception as e:
              print(f"⚠️ Error reading talconfig.yaml: {e}")
              versions['talos'] = 'unknown'
              versions['kubernetes'] = 'unknown'
          
          # 2. Scanner les applications Helm
          helm_apps = {}
          for root, dirs, files in os.walk('clusters/main/kubernetes'):
              for file in files:
                  if file == 'helm-release.yaml':
                      filepath = os.path.join(root, file)
                      try:
                          with open(filepath, 'r') as f:
                              content = f.read()
                              
                              # Extraire le nom de l'app
                              name_match = re.search(r'name:\s*([^\n]+)', content)
                              chart_match = re.search(r'chart:\s*([^\n]+)', content)
                              version_match = re.search(r'version:\s*([^\n]+)', content)
                              
                              if name_match:
                                  app_name = name_match.group(1).strip()
                                  chart = chart_match.group(1).strip() if chart_match else 'unknown'
                                  version = version_match.group(1).strip() if version_match else 'latest'
                                  
                                  helm_apps[app_name] = {
                                      'chart': chart,
                                      'version': version,
                                      'path': filepath
                                  }
                      except Exception as e:
                          print(f"⚠️ Error processing {filepath}: {e}")
          
          # 3. Créer un JSON avec les versions
          output = {
              'talos_version': versions.get('talos', 'unknown'),
              'kubernetes_version': versions.get('kubernetes', 'unknown'),
              'helm_applications': helm_apps,
              'last_update': datetime.now().isoformat()
          }
          
          # 4. Exporter en fichier JSON
          with open('versions.json', 'w') as f:
              json.dump(output, f, indent=2)
          
          print(json.dumps(output, indent=2))
          
          # 5. Exporter comme output
          print(f"::set-output name=talos_version::{versions.get('talos', 'unknown')}")
          print(f"::set-output name=kubernetes_version::{versions.get('kubernetes', 'unknown')}")
          print(f"::set-output name=app_count::{len(helm_apps)}")
          EOF

      - name: Generate README Badge Section
        id: badges
        run: |
          python3 - <<'EOF'
          import json
          
          with open('versions.json', 'r') as f:
              data = json.load(f)
          
          talos_v = data['talos_version']
          k8s_v = data['kubernetes_version']
          app_count = len(data['helm_applications'])
          
          badges = f"""## 📊 Status Cluster (Auto-généré)

[![Talos Version](https://img.shields.io/badge/Talos-v{talos_v}-blue?style=flat-square&logo=linux)](https://github.com/siderolabs/talos/releases/tag/v{talos_v})
[![Kubernetes Version](https://img.shields.io/badge/Kubernetes-v{k8s_v}-326ce5?style=flat-square&logo=kubernetes)](https://kubernetes.io/releases/)
[![Status](https://img.shields.io/badge/Status-Active-green?style=flat-square)]()
[![Last Updated](https://img.shields.io/badge/Updated-{data['last_update'][:10]}-lightgrey?style=flat-square)]()

### 📦 Applications Déployées ({app_count})

| Application | Chart | Version |
|-------------|-------|---------|"""
          
          for app, info in sorted(data['helm_applications'].items()):
              chart = info['chart']
              version = info['version']
              badges += f"\n| {app} | {chart} | {version} |"
          
          with open('BADGES_SECTION.md', 'w') as f:
              f.write(badges)
          
          print(badges)
          EOF

      - name: Update README.md
        run: |
          python3 - <<'EOF'
          import re
          
          # Lire les badges générées
          with open('BADGES_SECTION.md', 'r') as f:
              badges = f.read()
          
          # Lire le README actuel
          with open('README.md', 'r') as f:
              readme_content = f.read()
          
          # Pattern pour trouver la section à remplacer
          pattern = r'(## 📊 Status Cluster.*?)(?=\n## |$)'
          
          if re.search(pattern, readme_content, re.DOTALL):
              # Remplacer la section existante
              new_content = re.sub(pattern, badges + '\n', readme_content, flags=re.DOTALL)
          else:
              # Ajouter après le titre principal
              new_content = re.sub(
                  r'(# TalosCluster\n)',
                  r'\1\n' + badges + '\n',
                  readme_content
              )
          
          with open('README.md', 'w') as f:
              f.write(new_content)
          
          print("✅ README.md updated successfully")
          EOF

      - name: Check for changes
        id: changed
        run: |
          if git diff --quiet README.md; then
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "No changes detected in README.md"
          else
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "Changes detected in README.md"
              git diff README.md | head -50
          fi

      - name: Commit and Push changes
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md versions.json
          git commit -m "🤖 chore: auto-update README with current versions [skip ci]"
          git push

      - name: Job Summary
        if: always()
        run: |
          echo "## ✅ README Auto-Update Workflow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: Completed" >> $GITHUB_STEP_SUMMARY
          echo "**Talos Version**: ${{ steps.versions.outputs.talos_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Kubernetes Version**: ${{ steps.versions.outputs.kubernetes_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Applications Found**: ${{ steps.versions.outputs.app_count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Changes Detected**: ${{ steps.changed.outputs.changed }}" >> $GITHUB_STEP_SUMMARY
